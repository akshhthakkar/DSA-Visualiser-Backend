name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsavisualizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run Lint
        working-directory: backend
        run: npm run lint

      - name: Run Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Run DB Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dsavisualizer_test?schema=public
        run: npx prisma migrate deploy

      - name: Run Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dsavisualizer_test?schema=public
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dsavisualizer_test?schema=public
          REDIS_URL: redis://localhost:6379
          TEST_REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-min-32-characters-long-string
          NODE_ENV: test
          EMAIL_ENABLED: "false"
          FRONTEND_URL: http://localhost:5173
          PISTON_URL: http://localhost:10200/api/v2/execute
        run: npm test
